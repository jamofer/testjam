services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testjam
      POSTGRES_PASSWORD: testjam
      POSTGRES_DB: testjam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testjam"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://testjam:testjam@db:5432/testjam
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn testjam.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/docs')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  e2e:
    build: ./tests/e2e
    profiles: ["e2e"]
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      TESTJAM_BASE_URL: http://api:8000/api/v1
      TESTJAM_FRONTEND_URL: http://frontend:5173
      TESTJAM_ADMIN_USER: ${TESTJAM_ADMIN_USER:-admin}
      TESTJAM_ADMIN_PASS: ${TESTJAM_ADMIN_PASS:-admin123}
      TESTJAM_E2E_PROJECT: ${TESTJAM_E2E_PROJECT:-Testjam E2E}
    volumes:
      - ./tests/e2e:/tests/e2e
    working_dir: /tests/e2e
    command: >
      robot --listener testjam_e2e.e2e_listener.TestjamE2EListener suites/

volumes:
  postgres_data:
  uploads:
