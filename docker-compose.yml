services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testjam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testjam}
      POSTGRES_DB: ${POSTGRES_DB:-testjam}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testjam}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-testjam}:${POSTGRES_PASSWORD:-testjam}@db:5432/${POSTGRES_DB:-testjam}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn testjam.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/docs')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

  e2e:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    profiles: ["e2e"]
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      TESTJAM_API_URL: http://api:8000/api/v1
      TESTJAM_FRONTEND_URL: http://frontend:5173
      TESTJAM_MAILPIT_URL: http://mailpit:8025
      TESTJAM_USER: ${TESTJAM_USER:-admin}
      TESTJAM_PASS: ${TESTJAM_PASS:-admin123}
      TESTJAM_PROJECT: ${TESTJAM_PROJECT:-Testjam E2E}
    volumes:
      - ./tests/e2e:/tests/e2e
      - ./listener:/listener
    working_dir: /tests/e2e
    command: >
      robot --listener testjam_listener.TestjamListener suites/

volumes:
  postgres_data:
  uploads:
