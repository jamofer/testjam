          in: query
          schema:
            $ref: '#/components/schemas/ExecutionStatus'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TestExecution'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
