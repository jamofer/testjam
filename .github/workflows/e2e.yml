name: E2E

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  robot:
    name: Robot Framework + Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose -f docker-compose-dev.yml --profile e2e build

      - name: Start stack
        run: docker compose -f docker-compose-dev.yml up -d --wait db api frontend mailpit

      - name: Seed admin user
        run: make admin

      - name: Run listener tests
        run: make test-listener

      - name: Run orchestrator tests
        run: make test-orchestrator

      - name: Run e2e via orchestrator
        run: make test-e2e

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            tests/e2e/results
            tests/e2e/log.html
            tests/e2e/output.xml
            tests/e2e/report.html
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose-dev.yml down -v
