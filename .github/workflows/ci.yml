name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test -- --run

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Robot Framework + Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose --profile e2e build

      - name: Start stack
        run: docker compose up -d --wait db api frontend

      - name: Seed admin user
        run: |
          docker compose exec -T api python scripts/create_admin.py \
            --username admin --email admin@example.com --password admin123

      - name: Run Robot Framework suites
        run: docker compose --profile e2e run --rm e2e robot suites/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            tests/e2e/log.html
            tests/e2e/output.xml
            tests/e2e/report.html
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose down -v
