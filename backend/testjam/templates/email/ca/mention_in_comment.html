{% extends "_layout.html" %}
{% block content %}
<p style="font-size: 16px; line-height: 1.5;">
  <strong>{{ actor }}</strong> t'ha mencionat a <strong>{{ subject_object }}</strong>.
</p>
{% if excerpt %}
<blockquote style="margin: 16px 0; padding: 12px 16px; background: #f3f4f6; border-left: 3px solid #2563eb; color: #1f2937; white-space: pre-wrap;">{{ excerpt }}</blockquote>
{% endif %}
<p style="margin: 24px 0;">
  <a href="{{ link_in_app }}" style="display: inline-block; background: #2563eb; color: #fff; padding: 10px 18px; border-radius: 6px; text-decoration: none;">
    Obrir la conversa
  </a>
</p>
{% endblock %}
