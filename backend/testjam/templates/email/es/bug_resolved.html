{% extends "_layout.html" %}
{% block content %}
<p style="font-size: 16px; line-height: 1.5;">
  <strong>{{ actor }}</strong> marcó el bug <strong>{{ subject_object }}</strong> como <strong>{{ status }}</strong>.
</p>
<p style="margin: 24px 0;">
  <a href="{{ link_in_app }}" style="display: inline-block; background: #16a34a; color: #fff; padding: 10px 18px; border-radius: 6px; text-decoration: none;">
    Abrir el bug
  </a>
</p>
{% endblock %}
